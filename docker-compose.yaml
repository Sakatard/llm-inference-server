services:
  llm-inference-server:
    build:
      context: .
      dockerfile: Dockerfile.combined
    image: llm-inference-server
    container_name: llm-inference-server
    ports:
      - "8088:8080"
    volumes:
      - ./models:/models
    environment:
      - IDLE_TIMEOUT=1200
      - ENABLE_MTP=1
      - MTP_MODEL_PATH=/models/Qwen3.6-27B-Trader-IQ4_XS.gguf
      - MTP_DRAFT_N_MAX=3
      - MTP_CACHE_TYPE=turbo4
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
