services:
  llm-inference-server:
    build:
      context: .
      dockerfile: Dockerfile.combined
    image: llm-inference-server
    container_name: llm-inference-server
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    environment:
      - IDLE_TIMEOUT=300
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
